proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🔯 故障转移
      - 🔮 负载均衡
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🚀 手动切换
      - DIRECT
  - name: 🚀 手动切换
    type: select
    proxies:
      - "🇺🇲 美1"
      - "🇺🇲 美2"
      - "🇺🇲 美3"
      - "🇯🇵 日4"
      - "🇺🇲 美5"
      - "🇺🇲 美801"
  - name: ♻️ 自动选择
    type: url-test
    url: http://www.msftconnecttest.com/connecttest.txt
    interval: 300
    tolerance: 200
    proxies:
      - "🇺🇲 美1"
      - "🇺🇲 美2"
      - "🇺🇲 美3"
      - "🇯🇵 日4"
