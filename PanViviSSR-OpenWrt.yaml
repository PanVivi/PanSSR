# OpenWrt 软路由专用 Clash 配置 - PanViviSSR
# 适用于 OpenClash / Clash.Meta 内核
# 最后更新: 2026-03-08
# 特点: 软路由低延迟优化、域名解析防失效、节点短名、DNS 防泄漏、规则长间隔更新
# 容差参数: 日本160ms/美国220ms - 专为软路由150-300ms延迟环境调优

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# DNS 块 - v3.1 最终定稿（防泄漏 + JMS 域名优先国内 DoH）
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - '+.stun.*.*'
    - 'localhost.ptlogin2.qq.com'
    - '+.qq.com'
    - '+.tencent.com'
    - '+.weixin.qq.com'
  nameserver-policy:
    'geosite:cn,private,category-games@cn':
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    '+.portablesubmarines.com': https://dns.alidns.com/dns-query  # JMS 域名优先国内 DoH，防污染
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - tls://1.1.1.1:853
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/8
      - 127.0.0.0/8

proxies:
